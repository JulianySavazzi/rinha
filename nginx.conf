events {
    worker_connections 4096;
}

http {
    access_log off;
    error_log /dev/null;

    upstream rinha_api {
        server api1:9999;
        server api2:9999;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://rinha_api;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }
    }
}
